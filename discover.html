<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover | UniMatch</title>
  <meta name="description" content="Discover students on your campus — swipe, match, and connect.">
  <link rel="stylesheet" href="discover.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ═══ TOP NAV ═══ -->
  <nav class="disc-topnav">
    <div class="disc-topnav-logo" onclick="location.href='dashboard.html'">
      <div class="disc-logo-mark">U</div>
      <span class="disc-logo-text">UniMatch</span>
    </div>
    <h2 class="disc-topnav-title">Discover</h2>
    <div class="disc-topnav-actions">
      <button class="disc-icon-btn" id="filterBtn" title="Filters" aria-label="Open filters">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ═══ SWIPE ARENA ═══ -->
  <main class="swipe-arena">

    <!-- Card Stack -->
    <div class="card-stack" id="cardStack">
      <div class="stack-loading" id="stackLoading">
        <div class="stack-spinner"></div>
        <p>Finding your people…</p>
      </div>
    </div>

    <!-- SWIPE DIRECTION OVERLAYS (on active card) -->
    <div class="swipe-overlay-nope" id="overlayNope">NOPE</div>
    <div class="swipe-overlay-like" id="overlayLike">LIKE ❤️</div>
    <div class="swipe-overlay-super" id="overlaySuper">SUPER ⭐</div>

    <!-- Action Buttons -->
    <div class="action-row" id="actionRow">
      <button class="action-btn action-pass" id="btnPass" title="Pass">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
      <button class="action-btn action-super" id="btnSuper" title="Super Like">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </button>
      <button class="action-btn action-like" id="btnLike" title="Like">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>
  </main>

  <!-- ═══ FILTER SHEET ═══ -->
  <div class="filter-backdrop" id="filterBackdrop"></div>
  <div class="filter-sheet" id="filterSheet">
    <div class="filter-handle"></div>
    <div class="filter-header">
      <h3>Discovery Filters</h3>
      <button class="filter-close" id="filterClose">✕</button>
    </div>
    <div class="filter-body">
      <div class="filter-group">
        <label class="filter-label">Campus</label>
        <input type="text" id="filterCampus" class="filter-input" placeholder="e.g. Main Campus">
      </div>
      <div class="filter-group">
        <label class="filter-label">Course / Major</label>
        <input type="text" id="filterCourse" class="filter-input" placeholder="e.g. Computer Science">
      </div>
      <div class="filter-group">
        <label class="filter-label">Year of Study</label>
        <select id="filterYear" class="filter-input">
          <option value="">All Years</option>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
          <option value="5">Graduate / PG</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Show Me</label>
        <select id="filterPreference" class="filter-input">
          <option value="all">Everyone</option>
          <option value="male">Men</option>
          <option value="female">Women</option>
          <option value="nonbinary">Non-Binary</option>
        </select>
      </div>
      <div class="filter-actions">
        <button class="btn-filter-apply" id="applyFiltersBtn">Apply Filters</button>
        <button class="btn-filter-reset" id="resetFiltersBtn">Reset</button>
      </div>
    </div>
  </div>

  <!-- ═══ HISTORY DRAWER (preserved) ═══ -->
  <div class="hist-backdrop" id="histBackdrop"></div>
  <div class="hist-drawer" id="histDrawer">
    <div class="hist-header">
      <h2>Swipe History</h2>
      <button class="hist-close" id="histClose">✕</button>
    </div>
    <div class="hist-tabs">
      <button class="hist-tab active" data-tab="liked">❤️ Liked</button>
      <button class="hist-tab" data-tab="passed">✕ Passed</button>
    </div>
    <div class="hist-body" id="histBody">
      <div class="hist-loading"><div class="hist-spinner"></div><span>Loading...</span></div>
    </div>
  </div>

  <!-- ═══ INTERESTS SELECTOR (preserved) ═══ -->
  <div class="interests-modal-overlay" id="interestsModalOverlay">
    <div class="interests-modal">
      <div class="modal-header">
        <h3>Select Interests</h3>
        <button class="close-modal-btn" id="closeInterestsModalBtn">✕</button>
      </div>
      <div class="interests-grid-container" id="modalInterestsGrid"></div>
      <div class="modal-footer">
        <button type="button" class="apply-btn" id="applyInterestsBtn">Save Interests</button>
      </div>
    </div>
  </div>

  <!-- ═══ MATCH CELEBRATION (preserved) ═══ -->
  <div class="match-celebration-overlay" id="matchCelebrationOverlay">
    <div class="match-celebration-card">
      <div class="sparkles-container"></div>
      <h2 class="match-title">It's a Match! 🎉</h2>
      <p class="match-subtitle">You and <span id="celebrationMatchName">Someone</span> liked each other!</p>
      <div class="celebration-avatars">
        <div class="avatar-ring viewer-ring">
          <img id="celebrationViewerPhoto" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0iIzFhMWEyZSIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iMzgiIHI9IjE4IiBmaWxsPSIjNDQ0NDY2Ii8+PGVsbGlwc2UgY3g9IjUwIiBjeT0iODUiIHJ4PSIyOCIgcnk9IjIwIiBmaWxsPSIjNDQ0NDY2Ii8+PC9zdmc+" alt="You">
        </div>
        <div class="avatar-heart-badge">💖</div>
        <div class="avatar-ring target-ring">
          <img id="celebrationTargetPhoto" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0iIzFhMWEyZSIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iMzgiIHI9IjE4IiBmaWxsPSIjNDQ0NDY2Ii8+PGVsbGlwc2UgY3g9IjUwIiBjeT0iODUiIHJ4PSIyOCIgcnk9IjIwIiBmaWxsPSIjNDQ0NDY2Ii8+PC9zdmc+" alt="Match">
        </div>
      </div>
      <div class="match-icebreakers">
        <h4>Break the Ice! 💬</h4>
        <div class="icebreakers-pills" id="celebrationIcebreakers"></div>
      </div>
      <div class="celebration-buttons">
        <button id="celebrationChatBtn" class="chat-btn">Start Chatting</button>
        <button id="celebrationCloseBtn" class="keep-btn">Keep Swiping</button>
      </div>
    </div>
  </div>

  <!-- ═══ 5-TAB BOTTOM NAV ═══ -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="bn-item" id="bn-home">
      <div class="bn-indicator"></div>
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="bn-label">Home</span>
    </a>
    <a href="discover.html" class="bn-item active" id="bn-discover">
      <div class="bn-indicator"></div>
      <svg class="bn-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.66 11.2c-.23-.3-.51-.56-.77-.82-.67-.6-1.43-1.03-2.07-1.66C13.33 7.26 13 4.85 13.95 3c-.95.23-1.78.75-2.49 1.32-2.86 2.32-3.94 6.1-2.83 9.62.13.45.11.93-.15 1.3-.25.36-.62.5-.98.56-.37.06-.75-.04-1.03-.27-.48-.39-.59-1.02-.36-1.52.23-.52.22-1.1-.01-1.6-.33-.75-1.07-1.26-1.87-1.19-.52.04-1 .33-1.27.78-.28.46-.3 1.01-.06 1.49.38.74 1.12 1.23 1.86 1.44.37.1.76.14 1.14.11.9-.06 1.74-.46 2.31-1.13.48-.57.72-1.32.67-2.07C8.83 11.26 10.67 13 11.5 15c.64 1.56.83 3.3.49 5 1.07-.96 1.75-2.18 2-3.5.22-1.15.05-2.34-.32-3.45-.37-1.11-.93-2.16-1.01-3.35 1.28 1.13 2.23 2.64 2.5 4.34.37 2.32-.12 4.55-1.5 6.46.62-.03 1.24-.22 1.8-.54 1.68-.97 2.64-2.84 2.64-4.73 0-2.09-1.28-4.33-2.95-5.83-.3-.27-.64-.49-.99-.7z"/>
      </svg>
      <span class="bn-label">Discover</span>
    </a>
    <a href="matches.html" class="bn-item" id="bn-matches">
      <div class="bn-indicator"></div>
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span class="bn-label">Matches</span>
    </a>
    <a href="matches.html" class="bn-item" id="bn-chat">
      <div class="bn-indicator"></div>
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="bn-label">Chat</span>
    </a>
    <a href="profile.html?edit=true" class="bn-item" id="bn-profile">
      <div class="bn-indicator"></div>
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="bn-label">Profile</span>
    </a>
  </nav>

  <script type="module" src="discover.js"></script>
</body>
</html>
