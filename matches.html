<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matches & Chat | UniMatch</title>
  <meta name="description" content="Connect with your matches and start conversations on UniMatch.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09080f;
      --surface: #13111c;
      --surface-2: #1c192b;
      --surface-3: #27233c;
      --border: rgba(255, 255, 255, 0.08);
      --purple: #7c3aed;
      --purple-soft: #9333ea;
      --purple-glow: rgba(124, 58, 237, 0.35);
      --purple-alpha: rgba(124, 58, 237, 0.15);
      --rose: #ec4899;
      --green: #10b981;
      --ink: #ffffff;
      --ink-2: #c4badb;
      --ink-muted: #8b7fa8;
      --bottomnav-h: 72px;
      --topnav-h: 60px;
      --ease: cubic-bezier(0.4,0,0.2,1);
      --spring: cubic-bezier(0.34,1.56,0.64,1);
    }
    html, body { height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--ink); }

    /* TOP NAV */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--topnav-h);
      background: rgba(9, 8, 15, 0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    .top-nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .top-nav-logo-mark {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, var(--purple), var(--purple-soft));
      color: white; font-size: 16px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px var(--purple-glow);
    }
    .top-nav-logo-text { font-size: 15px; font-weight: 800; color: var(--ink); letter-spacing: -0.4px; }

    .nav-avatar-wrap {
      width: 34px; height: 34px; border-radius: 50%; overflow: hidden;
      border: 2px solid var(--purple); cursor: pointer; flex-shrink: 0;
    }
    .nav-avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }

    /* MESSENGER SHELL */
    .messenger { display: flex; height: 100vh; padding-top: var(--topnav-h); padding-bottom: var(--bottomnav-h); }

    /* SIDEBAR */
    .sidebar {
      width: 380px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-head { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .sidebar-title { font-size: 20px; font-weight: 800; color: var(--ink); margin-bottom: 10px; letter-spacing: -0.4px; }

    /* NEW MATCHES HORIZONTAL STRIP */
    .new-matches-section { padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .new-matches-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--rose); margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
    .new-matches-row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .new-matches-row::-webkit-scrollbar { display: none; }
    
    .new-match-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex-shrink: 0; width: 64px; text-align: center; }
    .new-match-avatar-ring {
      width: 54px; height: 54px; border-radius: 50%; padding: 2px;
      background: linear-gradient(135deg, var(--rose), var(--purple));
      box-shadow: 0 0 12px rgba(236, 72, 153, 0.4);
      animation: pulseGlow 2s infinite alternate;
    }
    @keyframes pulseGlow { 0% { box-shadow: 0 0 8px rgba(236,72,153,0.3); } 100% { box-shadow: 0 0 16px rgba(236,72,153,0.7); } }
    .new-match-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .new-match-name { font-size: 11px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .new-match-badge { font-size: 9px; font-weight: 700; color: var(--purple-soft); background: var(--purple-alpha); padding: 2px 6px; border-radius: 10px; }

    /* SEARCH & FILTER CHIPS */
    .sidebar-search {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px 12px; margin-top: 4px;
    }
    .sidebar-search svg { flex-shrink: 0; color: var(--ink-muted); }
    .sidebar-search input {
      background: none; border: none; outline: none;
      font-family: inherit; font-size: 13px; color: var(--ink); width: 100%;
    }

    .filter-chips { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px 6px; flex-shrink: 0; scrollbar-width: none; }
    .filter-chips::-webkit-scrollbar { display: none; }
    .filter-chip {
      padding: 5px 12px; border-radius: 50px; font-size: 11px; font-weight: 600;
      background: var(--surface-2); border: 1px solid var(--border); color: var(--ink-muted);
      cursor: pointer; white-space: nowrap; transition: all 0.2s;
    }
    .filter-chip.active { background: var(--purple-alpha); border-color: var(--purple); color: var(--purple-soft); }

    /* CONVERSATION LIST */
    .conv-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-thumb { background: var(--purple-alpha); border-radius: 2px; }

    .conv-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; cursor: pointer;
      transition: background 0.15s; position: relative;
    }
    .conv-row:hover  { background: var(--surface-2); }
    .conv-row.active { background: rgba(124, 58, 237, 0.15); }
    .conv-row.active::before {
      content: ''; position: absolute; left: 0; top: 12px; bottom: 12px;
      width: 4px; border-radius: 0 4px 4px 0; background: var(--purple);
    }

    .conv-avatar-wrap { position: relative; flex-shrink: 0; }
    .conv-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      object-fit: cover; display: block; background: var(--surface-3);
    }
    .conv-online {
      position: absolute; bottom: 1px; right: 1px;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--green); border: 2px solid var(--surface);
    }

    .conv-body { flex: 1; min-width: 0; }
    .conv-top  { display: flex; align-items: baseline; justify-content: space-between; gap: 6px; margin-bottom: 3px; }
    .conv-name { font-size: 15px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-time { font-size: 11px; color: var(--ink-muted); flex-shrink: 0; }
    .conv-preview { font-size: 13px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview.unread { color: var(--ink); font-weight: 700; }
    
    .conv-compat-badge {
      display: inline-flex; align-items: center; gap: 2px;
      font-size: 10px; font-weight: 700; color: var(--rose);
      background: rgba(236, 72, 153, 0.12); padding: 1px 6px; border-radius: 8px;
    }

    .conv-badge {
      min-width: 20px; height: 20px; border-radius: 50px;
      background: var(--purple); color: white;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; padding: 0 6px;
    }

    .sidebar-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; padding: 40px 20px; color: var(--ink-muted);
      font-size: 13px; text-align: center;
    }
    .spin {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid var(--purple-alpha); border-top-color: var(--purple);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* RIGHT PANEL (CHAT IFRAME) */
    .chat-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; position: relative; }
    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 40px; color: var(--ink-muted); text-align: center;
    }
    .chat-empty-icon { font-size: 54px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .chat-empty h3 { font-size: 22px; font-weight: 800; color: var(--ink); margin-bottom: 4px; }
    .chat-empty p  { font-size: 14px; line-height: 1.6; max-width: 280px; color: var(--ink-2); }
    .chat-empty-btn {
      margin-top: 6px; padding: 12px 28px; border-radius: 50px;
      background: linear-gradient(135deg, var(--purple), var(--purple-soft));
      color: white; border: none; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s var(--spring);
      box-shadow: 0 4px 16px var(--purple-glow);
    }
    .chat-empty-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--purple-glow); }

    .chat-iframe { flex: 1; border: none; display: none; width: 100%; height: 100%; min-height: 0; }
    .chat-iframe.visible { display: block; }

    /* 5-TAB BOTTOM NAVIGATION */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
      height: var(--bottomnav-h);
      background: rgba(19, 17, 28, 0.92);
      backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      display: flex; align-items: stretch;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.3);
    }
    .bn-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; padding: 8px 4px;
      color: var(--ink-muted); text-decoration: none;
      position: relative; transition: color 0.2s var(--ease), transform 0.2s var(--spring);
      -webkit-tap-highlight-color: transparent; cursor: pointer;
    }
    .bn-item:hover { color: var(--purple-soft); }
    .bn-item:active { transform: scale(0.9); }
    .bn-item.active { color: var(--purple-soft); }
    .bn-indicator {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 0; height: 3px; border-radius: 0 0 3px 3px;
      background: linear-gradient(90deg, var(--purple), var(--rose));
      transition: width 0.3s var(--spring), opacity 0.3s; opacity: 0;
    }
    .bn-item.active .bn-indicator { width: 28px; opacity: 1; box-shadow: 0 2px 8px var(--purple-glow); }
    .bn-icon { width: 24px; height: 24px; flex-shrink: 0; transition: transform 0.2s var(--spring); }
    .bn-item.active .bn-icon { transform: scale(1.12); }
    .bn-label { font-size: 10px; font-weight: 600; line-height: 1; }

    /* MOBILE RESPONSIVE & DESKTOP OVERRIDES */
    @media (max-width: 768px) {
      .sidebar { width: 100%; position: absolute; inset: var(--topnav-h) 0 var(--bottomnav-h) 0; z-index: 10; transition: transform 0.3s var(--ease); }
      .sidebar.hidden { transform: translateX(-100%); }
      .chat-panel { position: absolute; inset: var(--topnav-h) 0 var(--bottomnav-h) 0; }
    }

    @media (min-width: 769px) {
      /* Diagonal Left Sidebar styling */
      .bottom-nav {
        position: fixed;
        top: 30px;
        bottom: 30px;
        left: 24px;
        width: 88px;
        height: calc(100vh - 60px);
        max-width: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        padding: 40px 0;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(19, 17, 28, 0.75);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.4);
        transform: skewY(-6deg);
        transform-origin: left top;
        z-index: 500;
      }

      /* Un-skew items to keep icons/text upright */
      .bn-item {
        width: 72px;
        height: 72px;
        flex: none;
        border-radius: 16px;
        transform: skewY(6deg);
        transition: color 0.2s var(--ease), background-color 0.2s var(--ease), transform 0.2s var(--spring);
      }

      /* Slanted active pill background instead of top line indicator */
      .bn-item.active {
        background: linear-gradient(135deg, rgba(124, 58, 237, 0.15), rgba(236, 72, 153, 0.08));
        color: var(--purple-soft);
      }

      .bn-indicator {
        display: none !important; /* Hide top bar indicator */
      }

      /* Add side gradient glow on active */
      .bn-item.active::before {
        content: '';
        position: absolute;
        left: 4px;
        top: 20%;
        height: 60%;
        width: 3px;
        border-radius: 99px;
        background: linear-gradient(to bottom, var(--purple), var(--rose));
        box-shadow: 0 0 8px var(--purple-glow);
      }

      /* Layout offsets to clear sidebar */
      .top-nav {
        left: 136px;
      }
      .messenger {
        padding-left: 120px;
        padding-bottom: 0;
      }
    }
  </style>
</head>

  <script type="module">
    import { supabase } from "./js/supabase.js";
    import { requireAuth } from "./auth-guard.js";

    const DA = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI5MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0iIzFhMWEyZSIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iMzgiIHI9IjE4IiBmaWxsPSIjNDQ0NDY2Ii8+PGVsbGlwc2UgY3g9IjUwIiBjeT0iODUiIHJ4PSIyOCIgcnk9IjIwIiBmaWxsPSIjNDQ0NDY2Ii8+PC9zdmc+";

    const convList       = document.getElementById("convList");
    const chatEmpty      = document.getElementById("chatEmpty");
    const chatIframe     = document.getElementById("chatIframe");
    const searchInput    = document.getElementById("searchInput");
    const sidebar        = document.getElementById("sidebar");
    const newMatchesRow  = document.getElementById("newMatchesRow");

    let currentUser      = null;
    let activeMatchId    = null;
    let allConvs         = [];
    let activeFilter     = "all";

    (async () => {
      try {
        currentUser = await requireAuth();
        listenConversations();

        if (currentUser.photo_url) {
          const navPhoto = document.getElementById("navPhoto");
          if (navPhoto) navPhoto.src = currentUser.photo_url;
        }

        const openId = new URLSearchParams(location.search).get("open") || new URLSearchParams(location.search).get("matchId");
        if (openId) openChat(openId);

        setupFilterChips();
      } catch (err) { window.location.replace("login.html"); }
    })();

    async function listenConversations() {
      await loadConversations();

      // Subscribe to Realtime matches changes
      supabase
        .channel("matches_realtime")
        .on("postgres_changes", { event: "*", schema: "public", table: "matches" }, () => loadConversations())
        .on("postgres_changes", { event: "*", schema: "public", table: "messages" }, () => loadConversations())
        .subscribe();
    }

    async function loadConversations() {
      const uid = currentUser.id;
      const { data: matches, error } = await supabase
        .from("matches")
        .select("*, p1:profiles!matches_user1_id_fkey(*), p2:profiles!matches_user2_id_fkey(*)")
        .or(`user1_id.eq.${uid},user2_id.eq.${uid}`)
        .order("last_message_at", { ascending: false });

      if (error) {
        console.error("Error loading matches:", error);
        return;
      }

      const convs = (matches || []).map(m => {
        const other = m.user1_id === uid ? m.p2 : m.p1;
        const unread = m.user1_id === uid ? (m.user1_unread || 0) : (m.user2_unread || 0);

        return {
          type: "dm",
          matchId: m.id,
          otherId: other?.id,
          name: other?.name || "User",
          photo: other?.photo_url || null,
          course: other?.course || "",
          campus: other?.campus || "",
          interests: other?.interests || [],
          preview: m.last_message || "Say hello 👋",
          ts: m.last_message_at ? new Date(m.last_message_at) : new Date(m.created_at),
          unread: unread,
          online: !!other?.online,
          compat: 92
        };
      });

      allConvs = convs;
      renderNewMatches();
      renderAll();
    }

    function renderNewMatches() {
      if (!newMatchesRow) return;
      if (allConvs.length === 0) {
        newMatchesRow.innerHTML = `<span style="font-size:12px;color:var(--ink-muted)">No new matches yet</span>`;
        return;
      }
      newMatchesRow.innerHTML = allConvs.slice(0, 8).map(c => `
        <div class="new-match-item" onclick="openChat('${c.matchId}')">
          <div class="new-match-avatar-ring">
            <img class="new-match-avatar" src="${c.photo || DA}" alt="${esc(c.name)}" onerror="this.src='${DA}'">
          </div>
          <span class="new-match-name">${esc(c.name.split(" ")[0])}</span>
          <span class="new-match-badge">Wave 👋</span>
        </div>
      `).join("");
    }

    function setupFilterChips() {
      document.querySelectorAll(".filter-chip").forEach(chip => {
        chip.addEventListener("click", () => {
          document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
          chip.classList.add("active");
          activeFilter = chip.dataset.filter;
          renderAll();
        });
      });
    }

    function renderAll() {
      const q = searchInput ? searchInput.value.toLowerCase().trim() : "";
      let list = allConvs;

      if (q) {
        list = list.filter(c => 
          c.name.toLowerCase().includes(q) || 
          c.course.toLowerCase().includes(q) ||
          c.campus.toLowerCase().includes(q) ||
          (c.interests && c.interests.some(i => i.toLowerCase().includes(q)))
        );
      }

      if (activeFilter === "online") list = list.filter(c => c.online);
      if (activeFilter === "unread") list = list.filter(c => c.unread > 0);

      if (!list.length) {
        convList.innerHTML = `<div class="sidebar-state">
          <div style="font-size:28px">💬</div>
          <span>No matches found</span>
        </div>`;
        return;
      }

      convList.innerHTML = "";
      list.forEach(conv => convList.appendChild(buildDMRow(conv)));
    }

    function buildDMRow(conv) {
      const row = document.createElement("div");
      row.className = "conv-row" + (conv.matchId === activeMatchId ? " active" : "");
      row.dataset.matchId = conv.matchId;
      row.dataset.uid     = conv.otherId;

      row.innerHTML = `
        <div class="conv-avatar-wrap">
          <img class="conv-avatar" src="${conv.photo || DA}" alt="${esc(conv.name)}" onerror="this.src='${DA}'">
          ${conv.online ? `<div class="conv-online"></div>` : ""}
        </div>
        <div class="conv-body">
          <div class="conv-top">
            <span class="conv-name">${esc(conv.name)}</span>
            <span class="conv-compat-badge">${conv.compat}% Match</span>
            <span class="conv-time">${fmtTs(conv.ts)}</span>
          </div>
          <div class="conv-preview${conv.unread > 0 ? " unread" : ""}">${esc(conv.preview)}</div>
        </div>
        ${conv.unread > 0 ? `<div class="conv-badge">${conv.unread > 99 ? "99+" : conv.unread}</div>` : ""}`;

      row.addEventListener("click", () => openChat(conv.matchId));
      return row;
    }

    function openChat(id) {
      activeMatchId = id;
      convList.querySelectorAll(".conv-row").forEach(r =>
        r.classList.toggle("active", r.dataset.matchId === id));
      chatEmpty.style.display = "none";
      chatIframe.classList.add("visible");
      chatIframe.src = "chat.html?matchId=" + id;
      if (window.innerWidth <= 768) sidebar.classList.add("hidden");
    }
    window.openChat = openChat;

    if (searchInput) searchInput.addEventListener("input", renderAll);

    window.addEventListener("message", e => {
      if (e.data === "chat:back" && window.innerWidth <= 768) {
        sidebar.classList.remove("hidden");
        chatEmpty.style.display = "flex";
        chatIframe.classList.remove("visible");
        activeMatchId = null;
        convList.querySelectorAll(".conv-row").forEach(r => r.classList.remove("active"));
      }
    });

    function fmtTs(d) {
      if (!d || isNaN(d)) return "";
      const diff = Date.now() - d.getTime();
      const m = Math.floor(diff/60000), h = Math.floor(diff/3600000);
      if (m < 1)  return "now";
      if (m < 60) return m + "m";
      if (h < 24) return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
      if (h < 48) return "Yesterday";
      return d.toLocaleDateString([], {month:"short", day:"numeric"});
    }

    function esc(str) {
      const d = document.createElement("div");
      d.textContent = str || "";
      return d.innerHTML;
    }
  </script>
</body>
</html>
