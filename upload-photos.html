<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media | UniMatch</title>
  <link rel="stylesheet" href="upload-photos.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    .top-navbar {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(10,10,26,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 1px 12px rgba(0,0,0,0.3);
    }
    .top-nav-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .top-nav-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .top-nav-logo-mark {
      width: 32px; height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, #6c47ff, #a855f7);
      color: white; font-size: 15px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(108,71,255,0.4);
    }
    .top-nav-logo-words { display: flex; flex-direction: column; line-height: 1; }
    .top-nav-logo-main  { font-size: 14px; font-weight: 700; color: white; letter-spacing: -0.3px; }
    .top-nav-logo-sub   { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .top-nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 4px;
    }
    .top-nav-link {
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      padding: 6px 15px;
      border-radius: 50px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .top-nav-link:hover  { color: white; background: rgba(255,255,255,0.1); }
    .top-nav-link.active { color: #a78bfa; background: rgba(108,71,255,0.25); font-weight: 600; }
    @media (max-width: 600px) {
      .top-nav-logo-words { display: none; }
      .top-nav-link { padding: 6px 10px; font-size: 12px; }
      .top-nav-content { padding: 0 12px; }
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>

  <!-- Shared Top Nav -->
  <nav class="top-navbar">
    <div class="top-nav-content">
      <div class="top-nav-logo" onclick="location.href='dashboard.html'">
        <div class="top-nav-logo-mark">U</div>
        <div class="top-nav-logo-words">
          <span class="top-nav-logo-main">UniMatch</span>
          <span class="top-nav-logo-sub">Your campus, connected</span>
        </div>
      </div>
      <div class="top-nav-links">
        <a href="dashboard.html" class="top-nav-link">Home</a>
        <a href="discover.html"  class="top-nav-link">Discover</a>
        <a href="matches.html"   class="top-nav-link">Messages</a>
        <a href="linkup.html"    class="top-nav-link">LinkUp</a>
      </div>
    </div>
  </nav>

  <!-- Page Navbar -->
  <nav class="navbar">
    <div class="nav-content">
      <button onclick="location.href='dashboard.html'" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1 class="page-title">My Media</h1>
      <div class="spacer"></div>
    </div>
  </nav>

  <main class="upload-page">

    <!-- User Profile Section -->
    <div class="profile-header">
      <div class="profile-photo-large">
        <img id="userProfilePhoto" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231a1a2e'/%3E%3Ccircle cx='50' cy='38' r='18' fill='%23444466'/%3E%3Cellipse cx='50' cy='85' rx='28' ry='20' fill='%23444466'/%3E%3C/svg%3E" alt="Profile">
      </div>
      <div class="profile-info">
        <h2 id="userName">Username</h2>
        <div class="profile-stats">
          <div class="stat">
            <span class="stat-value" id="photoCount">0</span>
            <span class="stat-label">photos</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="videoCount">0</span>
            <span class="stat-label">videos</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Upload Button -->
    <div class="upload-actions">
      <button class="upload-btn upload-photo-btn" id="uploadPhotoBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Upload</span>
        <input type="file" id="fileInput" accept="image/*,video/*" multiple hidden>
      </button>
    </div>

    <div id="uploadProgress" class="upload-progress" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p id="progressText">Uploading...</p>
    </div>

    <!-- Photos Section -->
    <div class="media-section" id="photosSection">
      <h3 class="section-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
          <path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Photos
      </h3>
      <div class="media-grid" id="photosGrid">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <p>Loading...</p>
        </div>
      </div>
    </div>

    <!-- Videos Section -->
    <div class="media-section" id="videosSection">
      <h3 class="section-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="1" y="5" width="15" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M16 9l6-4v14l-6-4V9z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        Videos
      </h3>
      <div class="media-grid" id="videosGrid">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <p>Loading...</p>
        </div>
      </div>
    </div>

  </main>

  <!-- 5-TAB BOTTOM NAVIGATION -->
  <style>
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
      height: 72px;
      background: rgba(19, 17, 28, 0.92);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: stretch;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.3);
    }
    .bn-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; padding: 8px 4px;
      color: #8b7fa8; text-decoration: none;
      position: relative; transition: color 0.2s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      -webkit-tap-highlight-color: transparent; cursor: pointer;
    }
    .bn-item:hover { color: #9333ea; }
    .bn-item:active { transform: scale(0.9); }
    .bn-item.active { color: #9333ea; }
    .bn-indicator {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 0; height: 3px; border-radius: 0 0 3px 3px;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      transition: width 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s; opacity: 0;
    }
    .bn-item.active .bn-indicator { width: 28px; opacity: 1; box-shadow: 0 2px 8px rgba(124,58,237,0.35); }
    .bn-icon { width: 24px; height: 24px; flex-shrink: 0; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1); }
    .bn-item.active .bn-icon { transform: scale(1.12); }
    .bn-label { font-size: 10px; font-weight: 600; line-height: 1; }
  </style>
  <nav class="bottom-nav">
    <a href="dashboard.html" class="bn-item" id="bn-home">
      <div class="bn-indicator"></div>
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="bn-label">Home</span>
    </a>
    <a href="discover.html" class="bn-item" id="bn-discover">
      <div class="bn-indicator"></div>
      <svg class="bn-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.66 11.2c-.23-.3-.51-.56-.77-.82-.67-.6-1.43-1.03-2.07-1.66C13.33 7.26 13 4.85 13.95 3c-.95.23-1.78.75-2.49 1.32-2.86 2.32-3.94 6.1-2.83 9.62.13.45.11.93-.15 1.3-.25.36-.62.5-.98.56-.37.06-.75-.04-1.03-.27-.48-.39-.59-1.02-.36-1.52.23-.52.22-1.1-.01-1.6-.33-.75-1.07-1.26-1.87-1.19-.52.04-1 .33-1.27.78-.28.46-.3 1.01-.06 1.49.38.74 1.12 1.23 1.86 1.44.37.1.76.14 1.14.11.9-.06 1.74-.46 2.31-1.13.48-.57.72-1.32.67-2.07C8.83 11.26 10.67 13 11.5 15c.64 1.56.83 3.3.49 5 1.07-.96 1.75-2.18 2-3.5.22-1.15.05-2.34-.32-3.45-.37-1.11-.93-2.16-1.01-3.35 1.28 1.13 2.23 2.64 2.5 4.34.37 2.32-.12 4.55-1.5 6.46.62-.03 1.24-.22 1.8-.54 1.68-.97 2.64-2.84 2.64-4.73 0-2.09-1.28-4.33-2.95-5.83-.3-.27-.64-.49-.99-.7z"/>
      </svg>
      <span class="bn-label">Discover</span>
    </a>
    <a href="matches.html" class="bn-item" id="bn-matches">
      <div class="bn-indicator"></div>
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span class="bn-label">Matches</span>
    </a>
    <a href="matches.html" class="bn-item" id="bn-chat">
      <div class="bn-indicator"></div>
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="bn-label">Chat</span>
    </a>
    <a href="profile.html?edit=true" class="bn-item active" id="bn-profile">
      <div class="bn-indicator"></div>
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="bn-label">Profile</span>
    </a>
  </nav>


  <script type="module" src="upload-photos.js"></script>
</body>
</html>
